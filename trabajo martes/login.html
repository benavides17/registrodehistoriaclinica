<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Historias Clínicas Pompeya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a5c8a 0%, #0f3d5c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      text-align: center;
    }

    .login-brand {
      margin-bottom: 30px;
    }

    .login-brand .brand-mark {
      font-size: 48px;
      font-weight: 600;
      color: #1a5c8a;
      margin-bottom: 10px;
      font-family: 'DM Serif Display', serif;
    }

    .login-brand .brand-name {
      font-size: 24px;
      font-weight: 600;
      color: #1c1a17;
    }

    .login-brand .brand-sub {
      font-size: 14px;
      color: #8a8680;
    }

    .login-form {
      margin-top: 30px;
      text-align: left;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      color: #1c1a17;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e3db;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1a5c8a;
      box-shadow: 0 0 0 3px rgba(26, 92, 138, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(135deg, #1a5c8a 0%, #0f3d5c 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(26, 92, 138, 0.3);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .alert-error {
      background: #fdeaea;
      color: #8a2020;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #8a2020;
    }

    .alert-error.show {
      display: block;
    }

    .demo-info {
      background: #eaf4ff;
      color: #1a5c8a;
      padding: 16px;
      border-radius: 8px;
      margin-top: 30px;
      font-size: 13px;
      line-height: 1.6;
    }

    .demo-info strong {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .demo-creds {
      background: white;
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    .demo-cred-line {
      margin: 6px 0;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 20px;
      }

      .login-brand .brand-mark {
        font-size: 36px;
      }

      .login-brand .brand-name {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">HC</div>
        <div class="brand-name">Pompeya</div>
        <div class="brand-sub">Historias Clínicas</div>
      </div>

      <div class="alert-error" id="alertError"></div>

      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            placeholder="tu@email.com" 
            required 
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••" 
            required 
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-button">🔐 Iniciar Sesión</button>
      </form>

      <div class="demo-info">
        <strong>👤 Credenciales de Demostración</strong>
        <div class="demo-creds">
          <div class="demo-cred-line"><strong>Admin:</strong></div>
          <div class="demo-cred-line">Email: admin@pompeya.local</div>
          <div class="demo-cred-line">Pass: admin123</div>
          <div class="demo-cred-line" style="margin-top: 12px;"><strong>Doctor:</strong></div>
          <div class="demo-cred-line">Email: doctor@pompeya.local</div>
          <div class="demo-cred-line">Pass: doctor123</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    // Verificar si ya está autenticado
    if (estaAutenticado()) {
      window.location.href = './';
      throw new Error('Ya autenticado');
    }

    // Crear usuarios demo si no existen
    function inicializarUsuariosDeDemostracion() {
      if (getUsuarios().length === 0) {
        crearUsuario({
          nombre: 'Administrador',
          email: 'admin@pompeya.local',
          contraseña: 'admin123',
          rol: 'admin'
        });

        crearUsuario({
          nombre: 'Dr. González',
          email: 'doctor@pompeya.local',
          contraseña: 'doctor123',
          rol: 'doctor'
        });

        crearUsuario({
          nombre: 'Recepcionista',
          email: 'recepcion@pompeya.local',
          contraseña: 'recepcion123',
          rol: 'usuario'
        });
      }
    }

    function handleLogin(event) {
      event.preventDefault();

      inicializarUsuariosDeDemostracion();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alertError = document.getElementById('alertError');

      const usuario = autenticar(email, password);

      if (usuario) {
        alertError.classList.remove('show');
        window.location.href = './';
      } else {
        alertError.textContent = '❌ Correo o contraseña incorrectos';
        alertError.classList.add('show');
        document.getElementById('password').value = '';
      }
    }

    // Inicializar usuarios demo al cargar
    inicializarUsuariosDeDemostracion();
  </script>
</body>
</html>
